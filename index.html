<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Tabla Periódica Interactiva</title>
  <style>
    body {
      margin: 0;
      background: #222 url('img/Aliens1.jpg') no-repeat center center;
      background-size: cover;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }
    #canvas {
      display: block;
      max-width: 100%;
      max-height: 100%;
      position: relative;
      z-index: 1;
    }
    #tip {
      position: absolute;
      background: rgba(0,0,0,0.8);
      color: white;
      padding: 4px 6px;
      border-radius: 6px;
      pointer-events: none;
      display: none;
      font-size: 14px;
      z-index: 2;
    }
    #toggleButton {
      position: absolute;
      top: 10px;
      right: 10px;
      background: #444;
      color: white;
      border: none;
      padding: 8px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      z-index: 2;
    }
    #toggleButton:hover {
      background: #666;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="tip"></div>
  <button id="toggleButton">Mostrar Imágenes</button>

  <script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const tip = document.getElementById("tip");
    const toggleButton = document.getElementById("toggleButton");

    let data, rectsEscalados = [];
    let scale = 1, offsetX = 0, offsetY = 0;
    let hoveredImg = null;
    let selected = null;
    let mode = 0; // 0 = vacío, 1 = imágenes, 2 = info

    fetch("data/elementos.json")
      .then(r => r.json())
      .then(json => {
        data = json;
        resizeCanvas();
        draw();
      });

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      if (!data) return;

      const w = data.dimensiones.ancho;
      const h = data.dimensiones.alto;
      const scaleX = canvas.width / w;
      const scaleY = canvas.height / h;
      scale = Math.min(scaleX, scaleY);

      offsetX = (canvas.width - w * scale) / 2;
      offsetY = (canvas.height - h * scale) / 2;

      rectsEscalados = data.elementos.map(el => {
        return {
          x: offsetX + el.posicion_x * scale,
          y: offsetY + el.posicion_y * scale,
          w: el.ancho * scale,
          h: el.alto * scale,
          el: el
        };
      });

      draw();
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      rectsEscalados.forEach(r => {
        // Hover → imagen del amigo
        if (mode === 1 || (hoveredImg && hoveredImg.simbolo === r.el.simbolo)) {
          const img = new Image();
          img.src = r.el.imagen_amigo;
          img.onload = () => ctx.drawImage(img, r.x, r.y, r.w, r.h);
          ctx.drawImage(img, r.x, r.y, r.w, r.h);
        }

        // Click o modo info → ficha de datos
        if ((mode === 2 || (selected && selected.simbolo === r.el.simbolo))) {
          ctx.fillStyle = "rgba(255,255,255,0.9)";
          ctx.fillRect(r.x, r.y, r.w, r.h);

          ctx.fillStyle = "#000";
          ctx.font = `${Math.floor(r.h * 0.25)}px sans-serif`;
          ctx.textAlign = "center";
          ctx.fillText(r.el.simbolo, r.x + r.w / 2, r.y + r.h * 0.4);

          ctx.font = `${Math.floor(r.h * 0.15)}px sans-serif`;
          ctx.fillText(r.el.nombre, r.x + r.w / 2, r.y + r.h * 0.65);
          if (r.el.propiedades.numero_atomico) {
            ctx.fillText("Z=" + r.el.propiedades.numero_atomico, r.x + r.w / 2, r.y + r.h * 0.85);
          }
        }
      });
    }

    function hitTest(px, py) {
      for (let i = 0; i < rectsEscalados.length; i++) {
        const r = rectsEscalados[i];
        if (px >= r.x && px <= r.x + r.w && py >= r.y && py <= r.y + r.h) return i;
      }
      return -1;
    }

    canvas.addEventListener("mousemove", e => {
      const idx = hitTest(e.clientX, e.clientY);
      if (idx >= 0) {
        const r = rectsEscalados[idx];
        tip.innerHTML = `${r.el.simbolo} - ${r.el.nombre}`;
        tip.style.left = (e.clientX + 10) + "px";
        tip.style.top = (e.clientY + 10) + "px";
        tip.style.display = "block";

        const img = new Image();
        img.src = r.el.imagen_amigo;
        img.onload = () => {
          hoveredImg = { simbolo: r.el.simbolo, img: img };
          draw();
        };
      } else {
        tip.style.display = "none";
        hoveredImg = null;
        if (mode === 0) selected = null;
        draw();
      }
    });

    canvas.addEventListener("click", e => {
      const idx = hitTest(e.clientX, e.clientY);
      if (idx >= 0) selected = rectsEscalados[idx].el;
      else selected = null;
      draw();
    });

    canvas.addEventListener("dblclick", e => {
      const idx = hitTest(e.clientX, e.clientY);
      if (idx >= 0) {
        const r = rectsEscalados[idx];
        const box = document.createElement("div");
        box.innerHTML = `🌌 Mundo virtual de <b>${r.el.nombre}</b>`;
        box.style.position = "absolute";
        box.style.left = (r.x + r.w / 2 - 80) + "px";
        box.style.top = (r.y + r.h + 10) + "px";
        box.style.width = "160px";
        box.style.background = "rgba(0,0,0,0.85)";
        box.style.color = "white";
        box.style.padding = "6px 8px";
        box.style.borderRadius = "8px";
        box.style.textAlign = "center";
        box.style.fontSize = "14px";
        box.style.zIndex = 1000;
        document.body.appendChild(box);
        setTimeout(() => box.remove(), 2000);
      }
    });

    toggleButton.addEventListener("click", () => {
      mode = (mode + 1) % 3; // 0 → 1 → 2 → 0
      if (mode === 0) toggleButton.innerText = "Mostrar Imágenes";
      if (mode === 1) toggleButton.innerText = "Mostrar Información";
      if (mode === 2) toggleButton.innerText = "Vaciar Tabla";
      draw();
    });

    window.addEventListener("resize", resizeCanvas);
  </script>
</body>
</html>
