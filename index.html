<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Tabla Periódica Interactiva</title>
  <style>
    body {
      margin: 0;
      background: #222 url('img/Aliens1.jpg') no-repeat center center;
      background-size: cover;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }
    #canvas {
      display: block;
      max-width: 100%;
      max-height: 100%;
    }
    #tip {
      position: absolute;
      background: rgba(0,0,0,0.8);
      color: white;
      padding: 4px 6px;
      border-radius: 6px;
      pointer-events: none;
      display: none;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="tip"></div>

  <script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const tip = document.getElementById("tip");

    let data, rectsEscalados = [];
    let scale = 1, offsetX = 0, offsetY = 0;
    let hoveredImg = null;
    let selected = null;
    let displayMode = 0; // 0 = solo tabla, 1 = mostrar imágenes, 2 = mostrar info completa

    fetch("data/elementos.json")
      .then(r => r.json())
      .then(json => {
        data = json;
        resizeCanvas();
        draw();
      });

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;

      if (!data) return;

      const w = data.dimensiones.ancho;
      const h = data.dimensiones.alto;
      const scaleX = canvas.width / w;
      const scaleY = canvas.height / h;
      scale = Math.min(scaleX, scaleY) * 1.4; // aumento 40% para móviles

      // Ajuste para que no se salga de la pantalla
      if (w * scale > canvas.width) scale = canvas.width / w;
      if (h * scale > canvas.height) scale = canvas.height / h;

      offsetX = (canvas.width - w * scale) / 2;
      offsetY = (canvas.height - h * scale) / 2;

      rectsEscalados = data.elementos.map(el => {
        return {
          x: offsetX + el.posicion_x * scale,
          y: offsetY + el.posicion_y * scale,
          w: el.ancho * scale,
          h: el.alto * scale,
          el: el
        };
      });

      draw();
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      rectsEscalados.forEach(r => {
        ctx.strokeStyle = "#00f";
        ctx.lineWidth = 1;
        ctx.strokeRect(r.x, r.y, r.w, r.h);

        // Mostrar imágenes si corresponde
        if ((displayMode === 1 || displayMode === 2) && r.el.imagen_amigo) {
          const img = new Image();
          img.src = r.el.imagen_amigo;
          img.onload = () => ctx.drawImage(img, r.x, r.y, r.w, r.h);
        }

        // Hover → imagen del amigo si displayMode=0
        if (hoveredImg && hoveredImg.simbolo === r.el.simbolo && displayMode === 0) {
          ctx.drawImage(hoveredImg.img, r.x, r.y, r.w, r.h);
        }

        // Click o displayMode=2 → ficha de datos
        if ((selected && selected.simbolo === r.el.simbolo) || displayMode === 2) {
          ctx.fillStyle = "rgba(255,255,255,0.9)";
          ctx.fillRect(r.x, r.y, r.w, r.h);

          ctx.fillStyle = "#000";
          ctx.font = `${Math.floor(r.h * 0.25)}px sans-serif`;
          ctx.textAlign = "center";
          ctx.fillText(r.el.simbolo, r.x + r.w / 2, r.y + r.h * 0.4);

          ctx.font = `${Math.floor(r.h * 0.15)}px sans-serif`;
          ctx.fillText(r.el.nombre, r.x + r.w / 2, r.y + r.h * 0.65);
          if (r.el.propiedades.numero_atomico) {
            ctx.fillText("Z=" + r.el.propiedades.numero_atomico, r.x + r.w / 2, r.y + r.h * 0.85);
          }
        }
      });
    }

    function hitTest(px, py) {
      for (let i = 0; i < rectsEscalados.length; i++) {
        const r = rectsEscalados[i];
        if (px >= r.x && px <= r.x + r.w && py >= r.y && py <= r.y + r.h) {
          return i;
        }
      }
      return -1;
    }

    // Hover
    canvas.addEventListener("mousemove", e => {
      const idx = hitTest(e.clientX, e.clientY);
      if (idx >= 0) {
        const r = rectsEscalados[idx];
        if (selected && selected.simbolo !== r.el.simbolo) selected = null;
        tip.innerHTML = `${r.el.simbolo} - ${r.el.nombre}`;
        tip.style.left = (e.clientX + 10) + "px";
        tip.style.top = (e.clientY + 10) + "px";
        tip.style.display = "block";

        if (displayMode === 0) {
          const img = new Image();
          img.src = r.el.imagen_amigo;
          img.onload = () => {
            hoveredImg = { simbolo: r.el.simbolo, img: img };
            draw();
          };
        }
      } else {
        tip.style.display = "none";
        hoveredImg = null;
        if (displayMode === 0) selected = null;
        draw();
      }
    });

    // Click
    canvas.addEventListener("click", e => {
      const idx = hitTest(e.clientX, e.clientY);
      if (idx >= 0) {
        selected = rectsEscalados[idx].el;
      } else {
        selected = null;
      }
      draw();
    });

    // Doble clic
    canvas.addEventListener("dblclick", e => {
      const idx = hitTest(e.clientX, e.clientY);
      if (idx >= 0) {
        const r = rectsEscalados[idx];
        const box = document.createElement("div");
        box.innerHTML = `🌌 Mundo virtual de <b>${r.el.nombre}</b>`;
        box.style.position = "absolute";
        box.style.left = (r.x + r.w / 2 - 80) + "px";
        box.style.top = (r.y + r.h + 10) + "px";
        box.style.width = "160px";
        box.style.background = "rgba(0,0,0,0.85)";
        box.style.color = "white";
        box.style.padding = "6px 8px";
        box.style.borderRadius = "8px";
        box.style.textAlign = "center";
        box.style.fontSize = "14px";
        box.style.zIndex = 1000;
        document.body.appendChild(box);
        setTimeout(() => box.remove(), 2000);
      }
    });

    window.addEventListener("resize", resizeCanvas);

    // Botón superior derecho
    const toggleBtn = document.createElement("button");
    toggleBtn.innerText = "Mostrar imágenes";
    toggleBtn.style.position = "fixed";
    toggleBtn.style.top = "10px";
    toggleBtn.style.right = "10px";
    toggleBtn.style.zIndex = 1000;
    toggleBtn.style.padding = "8px 12px";
    toggleBtn.style.background = "#444";
    toggleBtn.style.color = "#fff";
    toggleBtn.style.border = "none";
    toggleBtn.style.borderRadius = "6px";
    toggleBtn.style.cursor = "pointer";
    document.body.appendChild(toggleBtn);

    toggleBtn.addEventListener("click", () => {
      displayMode = (displayMode + 1) % 3;
      if (displayMode === 0) toggleBtn.innerText = "Mostrar imágenes";
      else if (displayMode === 1) toggleBtn.innerText = "Mostrar info";
      else toggleBtn.innerText = "Tabla vacía";
      draw();
    });
  </script>
</body>
</html>
